# ===================================================
# 업비트 자동매매 시스템 - 통합 설정 파일
# 모든 전략 파라미터, 스케줄 시간, 백테스팅 설정을
# 이 파일 한 곳에서 관리합니다.
# ===================================================

# ─── 매매 기본 설정 ───────────────────────────────
trading:
  # 실거래 여부 (true = 실거래, false = 시뮬레이션)
  live_trading: false

# ─── 실거래 전략 설정 ────────────────────────────
strategy:
  name: "ma_cross"
  short_window: 5
  long_window: 20
  ticker: "KRW-BTC"
  invest_ratio: 0.95
  # 전략 1: 크로스섹셔널 모멘텀
  cross_sectional_momentum:
    lookback_options: [7, 14, 21]
    top_k_options: [3, 5]

  # 전략 2: 리스크 패리티 (변동성 가중)
  risk_parity:
    vol_lookback_options: [20, 60]

  # 전략 3: 통합 전략 (모멘텀 + 변동성 + 거래량)
  combined:
    mom_lookback_options: [7, 14]
    vol_lookback: 20
    top_k_options: [5, 7]

  # 전략 4: RSI 역추세
  rsi_mean_reversion:
    rsi_period: 14
    threshold_options: [30, 40]
    top_k_options: [3, 5]

  # 전략 5: 듀얼 모멘텀 (단기 + 장기)
  dual_momentum:
    short_lookback_options: [7, 14]
    long_lookback: 60
    top_k_options: [3, 5]

  # 전략 6: 거래량 브레이크아웃
  volume_breakout:
    price_lookback: 5
    vol_ratio_options: [1.3, 1.5, 2.0]
    top_k_options: [3, 5]

  # 전략 7: MA 크로스 로테이션
  ma_cross_rotation:
    ma_pairs: [[5, 20], [10, 30], [3, 10]]
    top_k_options: [3, 5]

  # 전략 8: 모멘텀 반전
  momentum_reversal:
    mid_lookback_options: [20, 30]
    short_lookback: 5
    top_k_options: [3, 5]

  # 전략 9: 적응형 모멘텀
  adaptive_momentum:
    short_lb: 5
    long_lb: 30
    top_k_options: [3, 5]

# ─── 일일 리포트 설정 ─────────────────────────────
report:
  send_time: "08:00"
  metrics:
    - cumulative_return
    - mdd
    - win_rate
    - sharpe_ratio
  include_yesterday_trades: true
  include_market_comment: true

# ─── 백테스팅 설정 ────────────────────────────────
backtest:
  # 데이터 수집 일수 (800일 = 약 2.2년)
  data_days: 800
  # 업비트 거래 수수료 (편도)
  fee_rate: 0.0005

  # 멀티기간 OOS 테스트
  oos_periods: [15, 30, 45, 60]

  # 통계적 검증 설정
  validation:
    monte_carlo_simulations: 1000
    bootstrap_samples: 1000
    confidence_level: 0.95

  # 대상 코인 (13개)
  target_coins:
    - KRW-BTC
    - KRW-ETH
    - KRW-SOL
    - KRW-XRP
    - KRW-DOGE
    - KRW-ADA
    - KRW-AVAX
    - KRW-LINK
    - KRW-DOT
    - KRW-XLM
    - KRW-NEAR
    - KRW-UNI
    - KRW-POL

  save_to_db: false
  notify_on_complete: false
