# ===================================================
# 업비트 자동매매 시스템 - 통합 설정 파일
# 모든 전략 파라미터, 스케줄 시간, 백테스팅 설정을
# 이 파일 한 곳에서 관리합니다.
# ===================================================

# ─── 매매 기본 설정 ───────────────────────────────
trading:
  # 거래할 코인 목록
  target_coins:
    - KRW-BTC
    - KRW-ETH
    - KRW-XRP
  # 1회 매수 금액 (원)
  order_amount: 10000
  # 실거래 여부 (true = 실거래, false = 시뮬레이션)
  live_trading: false

# ─── 변동성 돌파 전략 설정 ────────────────────────
strategy:
  volatility_breakout:
    # K값: 목표가 계산에 사용하는 변동성 비율
    # 낮을수록 매매 빈도 높음 (0.3~0.7 권장)
    k: 0.5
    # 매도 시간 (HH:MM 형식)
    sell_time: "08:50"
    # 새 거래일 시작 시간
    reset_time: "09:00"

  dual_momentum:
    # 모멘텀 계산 기간 (일)
    lookback_days: 12
    # 무위험 자산 기준 (현금 보유 판단용 수익률, %)
    risk_free_rate: 0.0

  rsi_bollinger:
    # RSI 계산 기간
    rsi_period: 14
    # RSI 과매수 기준 (이 값 이상이면 매도 신호)
    rsi_overbought: 70
    # RSI 과매도 기준 (이 값 이하면 매수 신호)
    rsi_oversold: 30
    # 볼린저밴드 기간
    bb_period: 20
    # 볼린저밴드 표준편차 배수
    bb_std: 2.0

  ma_cross:
    # 단기 이동평균선 기간 (일)
    short_ma: 5
    # 장기 이동평균선 기간 (일)
    long_ma: 20

# ─── 일일 리포트 설정 ─────────────────────────────
report:
  # 리포트 전송 시간 (HH:MM 형식)
  send_time: "08:00"
  # 리포트에 포함할 지표 목록
  metrics:
    - cumulative_return   # 누적 수익률
    - mdd                 # 최대 낙폭
    - win_rate            # 승률
    - sharpe_ratio        # 샤프 지수
  # 어제 매매 내역 포함 여부
  include_yesterday_trades: true
  # 시장 상황 코멘트 포함 여부
  include_market_comment: true

# ─── 백테스팅 설정 ────────────────────────────────
backtest:
  # 기본 테스트 기간
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  # 초기 투자 자본 (원)
  initial_capital: 1000000
  # 업비트 거래 수수료 (%)
  fee_rate: 0.0005   # 0.05%
  # 백테스팅 대상 코인 (비워두면 trading.target_coins 사용)
  target_coins:
    - KRW-BTC
    - KRW-ETH
  # 결과를 Supabase에 저장할지 여부
  save_to_db: true
  # 완료 시 텔레그램 전송 여부
  notify_on_complete: true
