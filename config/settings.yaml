# ===================================================
# 업비트 자동매매 시스템 - 통합 설정 파일
# 모든 전략 파라미터, 스케줄 시간, 백테스팅 설정을
# 이 파일 한 곳에서 관리합니다.
# ===================================================

# ─── 매매 기본 설정 ───────────────────────────────
trading:
  # 실거래 여부 (true = 실거래, false = 시뮬레이션)
  live_trading: false

# ─── 현재 메인 전략: 이동평균 크로스 5/20 ──────────
strategy:
  name: "ma_cross"
  # 단기 이동평균 기간 (일)
  short_window: 5
  # 장기 이동평균 기간 (일)
  long_window: 20
  # 거래 코인
  ticker: "KRW-BTC"
  # 보유 현금의 투자 비율 (0.95 = 95%)
  invest_ratio: 0.95

# ─── 보조 전략: 변동성 돌파 (참고용) ───────────────
volatility_breakout:
  k: 0.5
  sell_time: "08:50"
  reset_time: "09:00"

# ─── 일일 리포트 설정 ─────────────────────────────
report:
  # 리포트 전송 시간 (HH:MM 형식)
  send_time: "08:00"
  # 리포트에 포함할 지표 목록
  metrics:
    - cumulative_return   # 누적 수익률
    - mdd                 # 최대 낙폭
    - win_rate            # 승률
    - sharpe_ratio        # 샤프 지수
  # 어제 매매 내역 포함 여부
  include_yesterday_trades: true
  # 시장 상황 코멘트 포함 여부
  include_market_comment: true

# ─── 백테스팅 설정 ────────────────────────────────
backtest:
  # 기본 테스트 기간
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  # 초기 투자 자본 (원)
  initial_capital: 1000000
  # 업비트 거래 수수료 (%)
  fee_rate: 0.0005   # 0.05%
  # 백테스팅 대상 코인 (비워두면 trading.target_coins 사용)
  target_coins:
    - KRW-BTC
    - KRW-ETH
  # 결과를 Supabase에 저장할지 여부
  save_to_db: true
  # 완료 시 텔레그램 전송 여부
  notify_on_complete: true
