# ===================================================
# 업비트 자동매매 시스템 - 통합 설정 파일
# 모든 전략 파라미터, 스케줄 시간, 백테스팅 설정을
# 이 파일 한 곳에서 관리합니다.
# ===================================================

# ─── 매매 기본 설정 ───────────────────────────────
trading:
  # 실거래 여부 (true = 실거래, false = 시뮬레이션)
  live_trading: true

# ─── 실거래 전략 설정 ────────────────────────────
# name 옵션:
#   "ma_cross"              → 기존 MA 크로스 5/20 (단일 코인)
#   "strategy_router"       → 국면별 자동 전략 스위칭 (권장)
#   "adaptive_volume"       → 적응형 거래량돌파 (단독 실행)
#   "portfolio_momentum"    → 모멘텀 포트폴리오 (멀티 코인)
#   "portfolio_rsi"         → RSI 역추세 포트폴리오
#   "portfolio_combined"    → 복합 포트폴리오 (모멘텀+저변동성)
#   "portfolio_ml"          → ML(LightGBM) 포트폴리오
strategy:
  name: "strategy_router"
  short_window: 5
  long_window: 20
  ticker: "KRW-BTC"
  invest_ratio: 0.95

# ─── 시장 국면 감지 설정 (v2: ADX 기반) ──────────────
# v2 변경: SMA50+모멘텀 → ADX 기반 (횡보 72%→44%, 전환비용 1%p 절감)
# ADX > adx_trend_threshold: +DI > -DI → 상승장, -DI > +DI → 하락장
# ADX <= adx_trend_threshold: 횡보장
regime_detection:
  adx_period: 14              # ADX 계산 기간
  adx_trend_threshold: 25     # 추세 판단 ADX 임계값 (25 이상 = 추세 존재)
  confirmation_days: 2        # 국면 전환 확인 대기일

# ─── 전략별 설정 (v2: 거래량돌파 중심) ────────────────
# v2 변경: BB+RSI 제거, 상승+횡보 모두 거래량돌파 사용
strategies:
  # 상승장+횡보장 공통: 적응형 거래량돌파
  # 실측: 상승장 +179%, 횡보장 +25.72%, 하락장 -22.76%
  volume_breakout:
    enabled: true
    regime: bull_and_sideways
    price_lookback: 4
    vol_ratio: 1.26
    top_k: 5
    rebalance_days: 3

  # 하락장 전략: 현금 보유
  cash_hold:
    enabled: true
    regime: bear

# ─── 포트폴리오 전략 설정 (name이 portfolio_* 일 때 사용) ──
portfolio:
  top_k: 5                  # 동시 보유 최대 코인 수
  rebalance_days: 3         # 리밸런싱 주기 (일)
  lookback: 14              # 모멘텀 계산 기간 (일)

  # 리스크 관리
  risk:
    max_invest_ratio: 0.95  # 최대 투자 비율 (전체 자산의 95%)
    max_coin_weight: 0.30   # 코인당 최대 비중 (30%)
    mdd_limit: -0.15        # MDD 한도 (-15% 초과 시 전량 매도)
    stop_loss_per_coin: -0.10  # 코인별 손절선 (-10%)
    min_order_krw: 5000     # 최소 주문 금액 (원)
    cool_down_hours: 1      # 손절 후 재진입 대기 시간
  # 전략 1: 크로스섹셔널 모멘텀
  cross_sectional_momentum:
    lookback_options: [7, 14, 21]
    top_k_options: [3, 5]

  # 전략 2: 리스크 패리티 (변동성 가중)
  risk_parity:
    vol_lookback_options: [20, 60]

  # 전략 3: 통합 전략 (모멘텀 + 변동성 + 거래량)
  combined:
    mom_lookback_options: [7, 14]
    vol_lookback: 20
    top_k_options: [5, 7]

  # 전략 4: RSI 역추세
  rsi_mean_reversion:
    rsi_period: 14
    threshold_options: [30, 40]
    top_k_options: [3, 5]

  # 전략 5: 듀얼 모멘텀 (단기 + 장기)
  dual_momentum:
    short_lookback_options: [7, 14]
    long_lookback: 60
    top_k_options: [3, 5]

  # 전략 6: 거래량 브레이크아웃
  volume_breakout:
    price_lookback: 5
    vol_ratio_options: [1.3, 1.5, 2.0]
    top_k_options: [3, 5]

  # 전략 7: MA 크로스 로테이션
  ma_cross_rotation:
    ma_pairs: [[5, 20], [10, 30], [3, 10]]
    top_k_options: [3, 5]

  # 전략 8: 모멘텀 반전
  momentum_reversal:
    mid_lookback_options: [20, 30]
    short_lookback: 5
    top_k_options: [3, 5]

  # 전략 9: 적응형 모멘텀
  adaptive_momentum:
    short_lb: 5
    long_lb: 30
    top_k_options: [3, 5]

# ─── 일일 리포트 설정 ─────────────────────────────
report:
  send_time: "08:00"
  metrics:
    - cumulative_return
    - mdd
    - win_rate
    - sharpe_ratio
  include_yesterday_trades: true
  include_market_comment: true

# ─── 백테스팅 설정 ────────────────────────────────
backtest:
  # 데이터 수집 일수 (800일 = 약 2.2년)
  data_days: 800
  # 업비트 거래 수수료 (편도)
  fee_rate: 0.0005

  # 멀티기간 OOS 테스트
  oos_periods: [15, 30, 45, 60]

  # 통계적 검증 설정
  validation:
    monte_carlo_simulations: 1000
    bootstrap_samples: 1000
    confidence_level: 0.95

  # 대상 코인 (13개)
  target_coins:
    - KRW-BTC
    - KRW-ETH
    - KRW-SOL
    - KRW-XRP
    - KRW-DOGE
    - KRW-ADA
    - KRW-AVAX
    - KRW-LINK
    - KRW-DOT
    - KRW-XLM
    - KRW-NEAR
    - KRW-UNI
    - KRW-POL

  save_to_db: false
  notify_on_complete: false

# ─── 고급 백테스트 설정 (Phase 1~3) ────────────
advanced_backtest:
  # 1단계: 베이지안 최적화 (Optuna)
  optuna:
    n_trials: 50              # 전략당 최적화 시도 횟수
    objective_metric: "sharpe" # 최적화 목표 (sharpe, calmar, return)
    oos_window: 30            # OOS 기간 (일)

  # 2단계: ML 전략 (LightGBM)
  ml:
    n_estimators: 200         # 부스팅 라운드 수
    train_days: 180           # 학습 데이터 기간 (일)
    retrain_days: 30          # 모델 재학습 주기 (일)
    target_horizon: 5         # 수익률 예측 기간 (일)
    top_k_options: [3, 5, 7]  # 선택할 상위 코인 수
    weight_mode: "confidence" # equal 또는 confidence

  # 3단계: 대안 데이터
  alt_data:
    fear_greed: true          # 공포탐욕 지수
    btc_dominance: true       # BTC 도미넌스
    funding_rate: true        # 펀딩비율
    funding_coins:            # 펀딩비율 수집 코인
      - KRW-BTC
      - KRW-ETH
      - KRW-SOL
